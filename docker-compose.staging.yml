version: "3.9"

# Dev/Staging VM — พอร์ต 3100/8100 เพื่อไม่ชนกับ Prod (3000/8000)

services:
  frontend:
    image: ${REGISTRY_URL}/lemcs-frontend:${IMAGE_TAG:-dev-latest}
    container_name: lemcs-dev-frontend
    ports:
      - "3100:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${API_BASE_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: ${REGISTRY_URL}/lemcs-backend:${IMAGE_TAG:-dev-latest}
    container_name: lemcs-dev-backend
    ports:
      - "8100:8000"
    env_file: .env
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: lemcs-dev-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: lemcs-dev-pgbouncer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: '*'
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lemcs-dev-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: lemcs-dev-minio
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9101:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  backup-scheduler:
    image: ${REGISTRY_URL}/lemcs-backend:${IMAGE_TAG:-dev-latest}
    container_name: lemcs-dev-backup
    command: python scripts/run_scheduler.py
    env_file: .env
    depends_on:
      - postgres
      - minio
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
