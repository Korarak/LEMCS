version: "3.9"

services:
  # ───────────────────────────────────────────
  # Frontend — Next.js 14 PWA (Production Image)
  # ───────────────────────────────────────────
  frontend:
    image: ${REGISTRY_URL}/lemcs-frontend:${IMAGE_TAG:-latest}
    container_name: lemcs-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${API_BASE_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ───────────────────────────────────────────
  # Backend — FastAPI (Production Image)
  # ───────────────────────────────────────────
  backend:
    image: ${REGISTRY_URL}/lemcs-backend:${IMAGE_TAG:-latest}
    container_name: lemcs-backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --loop uvloop
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ───────────────────────────────────────────
  # Database — PostgreSQL 16
  # ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lemcs-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────
  # Connection Pooler — PgBouncer
  # ───────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: lemcs-pgbouncer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: '*'
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ───────────────────────────────────────────
  # Cache — Redis 7
  # ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lemcs-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ───────────────────────────────────────────
  # Object Storage — MinIO
  # ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: lemcs-minio
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ───────────────────────────────────────────
  # Monitoring — Prometheus
  # ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: lemcs-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    restart: unless-stopped

  # ───────────────────────────────────────────
  # Monitoring — Grafana
  # ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: lemcs-grafana
    volumes:
      - grafanadata:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # ───────────────────────────────────────────
  # Backup Scheduler
  # ───────────────────────────────────────────
  backup-scheduler:
    image: ${REGISTRY_URL}/lemcs-backend:${IMAGE_TAG:-latest}
    container_name: lemcs-backup
    command: python scripts/run_scheduler.py
    env_file: .env
    depends_on:
      - postgres
      - minio
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  prometheusdata:
  grafanadata:
