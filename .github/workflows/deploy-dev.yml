name: Deploy to Dev/Staging

on:
  push:
    branches:
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Private Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/lemcs-backend:${{ steps.meta.outputs.tag }}
            ${{ secrets.REGISTRY_URL }}/lemcs-backend:dev-latest
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/lemcs-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/lemcs-backend:buildcache,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/lemcs-frontend:${{ steps.meta.outputs.tag }}
            ${{ secrets.REGISTRY_URL }}/lemcs-frontend:dev-latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.DEV_NEXT_PUBLIC_API_URL }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/lemcs-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/lemcs-frontend:buildcache,mode=max

  deploy:
    runs-on: ubuntu-24.04
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy compose file to Dev VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          port: ${{ secrets.DEV_SSH_PORT }}
          username: ${{ secrets.DEV_SSH_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          source: "docker-compose.staging.yml"
          target: "~/lemcs-dev/"
          strip_components: 0

      - name: Deploy to Dev VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          port: ${{ secrets.DEV_SSH_PORT }}
          username: ${{ secrets.DEV_SSH_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd ~/lemcs-dev

            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} \
              -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

            export REGISTRY_URL=${{ secrets.REGISTRY_URL }}
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}

            docker-compose -f docker-compose.staging.yml pull
            docker-compose -f docker-compose.staging.yml up -d --remove-orphans

            echo "Deployed dev image tag: $IMAGE_TAG"
